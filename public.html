<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Laporan Publik - Panitia Pengajian 2026</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .box-saldo { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { padding: 15px; border: 1px solid #ddd; border-radius: 5px; flex: 1; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <h1>📚 Laporan Keuangan Panitia Pengajian 2026</h1>

    <div class="box-saldo">
        <div class="card" style="background-color: #e6f4ea;">
            <h3>Total Donasi</h3>
            <p id="total-donasi">Rp 0</p>
        </div>
        <div class="card" style="background-color: #fce8e6;">
            <h3>Total Pengeluaran</h3>
            <p id="total-pengeluaran">Rp 0</p>
        </div>
        <div class="card" style="background-color: #e8f0fe;">
            <h3>Sisa Saldo Kas</h3>
            <p id="sisa-saldo">Rp 0</p>
        </div>
    </div>

    <h2>👥 Daftar Donasi Masuk</h2>
    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Tanggal</th>
                <th>Nama Donatur</th>
                <th>Jumlah</th>
                <th>Keterangan</th>
            </tr>
        </thead>
        <tbody id="tabel-donasi">
            </tbody>
    </table>

    <h2>📉 Daftar Pengeluaran</h2>
    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Tanggal</th>
                <th>Keperluan</th>
                <th>Jumlah</th>
                <th>Keterangan</th>
            </tr>
        </thead>
        <tbody id="tabel-pengeluaran">
            </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
